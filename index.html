<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMC calculo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
     <div class="Header"> 
    <h1>Calcule seu Indice de massa corporal</h1>
    <p>O calculo do IMC é feito dividindo o peso pela altura ao quadrado.</p>
     </div>
     <div class="content">
          <input type="number" id="peso" placeholder="Digite seu peso em kg">
     <div class="content1">
     <input type="number" id="altura" placeholder="Digite sua altura em metros">
     </div>
     <div class="content2">  
     <button onclick="calcularIMC()">Calcular IMC</button>
     </div>
     <p id="resultado"></p>
     <script>
         function calcularIMC() {
             var peso = document.getElementById("peso").value;
             var altura = document.getElementById("altura").value;
             var imc = peso / (altura * altura);
             document.getElementById("resultado").innerHTML = "Seu Indice de massa corporal em quilos é: " + imc.toFixed(2);
         }
     </script>
     </div>
</body>
</html>
